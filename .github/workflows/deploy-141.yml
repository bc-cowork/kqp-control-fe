name: Deploy to 141 server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-141
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create zip of repo contents
        run: |
          zip -r kqp-control-fe.zip . -x ".git/*" -x ".github/*"

      - name: Copy zip to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "kqp-control-fe.zip"
          target: "/home/user02/kuanta-offline-install/"
          overwrite: true

      - name: Build and restart on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          command_timeout: 30m
          script: |
            set -e
            cd /home/user02/kuanta-offline-install
            # -d puts repo contents inside kqp-control-fe/ (zip has no top-level folder)
            unzip -o kqp-control-fe.zip -d kqp-control-fe
            ./ci-build.sh
            ./ci-start.sh